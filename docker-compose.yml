services:
  postgres:
    image: postgres:17-alpine
    container_name: bubbleforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bubbleforge
      POSTGRES_PASSWORD: bubbleforge
      POSTGRES_DB: bubbleforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bubbleforge -d bubbleforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bubbleforge-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bubbleforge-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: development
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://bubbleforge:bubbleforge@postgres:5432/bubbleforge?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      ENCRYPTION_KEY: change-me-to-a-32-byte-secret-key
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  redis_data:
